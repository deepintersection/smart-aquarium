# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for smart-aquarium.
# Valid keys verified against: https://coderabbit.ai/integrations/schema.v2.json
# Only schema-defined keys are used — unknown keys cause a parse error.

language: "en-US"

early_access: true

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  poem: true
  auto_review:
    enabled: true
    drafts: true
  path_filters:
    - "!target/**"
    - "!**/*.lock"
  # Ask CodeRabbit to pay extra attention to Rust-specific patterns in our domain layer
  path_instructions:
    - path: "crates/domain/**/*.rs"
      instructions: >
        This is a Domain-Driven Design domain layer. Verify that:
        (1) no hardware or network dependencies are imported,
        (2) all public types derive Debug,
        (3) domain invariants are enforced at construction time,
        (4) every public function that returns a meaningful value is marked #[must_use].

  tools:
    clippy:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
